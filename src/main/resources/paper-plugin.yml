name: FineClaim
version: '${version}'
main: com.sandustnetwork.fineclaim.FineClaimPlugin
description: A lightweight land claim plugin for Paper/Folia servers.
api-version: '1.21'
folia-supported: true
permissions:
  fineclaim.command.claim:
    description: Allows claiming chunks
    default: true
  fineclaim.command.unclaim:
    description: Allows unclaiming chunks
    default: true
  fineclaim.command.trust:
    description: Allows trusting players in a claim
    default: true
  fineclaim.command.untrust:
    description: Allows untrusting players in a claim
    default: true
  fineclaim.command.info:
    description: Allows viewing claim information
    default: true
  fineclaim.admin.bypass:
    description: Bypass claim protection
    default: op
  fineclaim.admin.info:
    description: View any claim information
    default: op
