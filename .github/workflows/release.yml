name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without v prefix (example 1.0.0)
        required: true
        type: string
      version-type:
        description: Modrinth version channel
        required: true
        default: release
        type: choice
        options:
          - release
          - beta
          - alpha

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      mc-versions: ${{ steps.matrix.outputs.mc-versions }}
      modrinth-game-versions: ${{ steps.matrix.outputs.modrinth-game-versions }}
      version: ${{ steps.version.outputs.version }}
      version-type: ${{ steps.version.outputs.version-type }}
      tag: ${{ steps.version.outputs.tag }}
      release-name: ${{ steps.version.outputs.release-name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare Minecraft version matrix
        id: matrix
        run: bash .github/scripts/prepare-matrix.sh

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_VERSION_TYPE: ${{ github.event.inputs.version-type }}
        run: bash .github/scripts/resolve-version.sh

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mc-version: ${{ fromJSON(needs.prepare.outputs.mc-versions) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release JAR for Minecraft ${{ matrix.mc-version }}
        run: ./gradlew clean build --no-daemon -PmcVersion=${{ matrix.mc-version }} -PpluginVersion=${{ needs.prepare.outputs.version }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: fineclaim-mc${{ matrix.mc-version }}
          path: build/libs/FineClaim-*-mc${{ matrix.mc-version }}.jar
          if-no-files-found: error
          retention-days: 30

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Modrinth project id
        id: modrinth
        env:
          MODRINTH_PROJECT_ID_VAR: ${{ vars.MODRINTH_PROJECT_ID }}
          MODRINTH_PROJECT_ID_SECRET: ${{ secrets.MODRINTH_PROJECT_ID }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          if [[ -n "$MODRINTH_PROJECT_ID_VAR" ]]; then
            echo "id=$MODRINTH_PROJECT_ID_VAR" >> "$GITHUB_OUTPUT"
            echo "source=repository variable MODRINTH_PROJECT_ID" >> "$GITHUB_OUTPUT"
          elif [[ -n "$MODRINTH_PROJECT_ID_SECRET" ]]; then
            echo "id=$MODRINTH_PROJECT_ID_SECRET" >> "$GITHUB_OUTPUT"
            echo "source=repository secret MODRINTH_PROJECT_ID (fallback)" >> "$GITHUB_OUTPUT"
          fi

          if [[ -z "$(grep '^id=' "$GITHUB_OUTPUT" || true)" ]]; then
            echo "::error::Modrinth project id is missing."
            echo "Add a repository Actions VARIABLE named MODRINTH_PROJECT_ID at:"
            echo "  Settings → Secrets and variables → Actions → Variables → New repository variable"
            echo "Do not use the Secrets tab unless you also add secret MODRINTH_PROJECT_ID."
            echo "If using an organization variable, grant this repository access to it."
            exit 1
          fi

          if [[ -z "$MODRINTH_TOKEN" ]]; then
            echo "::error::Secret MODRINTH_TOKEN is required for Modrinth publishing."
            echo "Create a PAT at https://modrinth.com/settings/pats with VERSION_CREATE scope,"
            echo "then add it under Settings → Secrets and variables → Actions → Secrets."
            exit 1
          fi

          echo "Using Modrinth project id from $(grep '^source=' "$GITHUB_OUTPUT" | cut -d= -f2-)"

      - name: Download built JARs
        uses: actions/download-artifact@v4
        with:
          pattern: fineclaim-mc*
          path: dist
          merge-multiple: true

      - name: List release artifacts
        run: ls -lah dist

      - name: Build changelog
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: bash .github/scripts/build-changelog.sh release-notes.md

      - name: Prepare Modrinth game version list
        id: game_versions
        run: |
          {
            echo "list<<EOF"
            grep -v '^\s*#' gradle/modrinth-game-versions.txt | grep -v '^\s*$'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Releases and Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: ${{ needs.prepare.outputs.tag }}
          github-draft: false
          github-prerelease: ${{ needs.prepare.outputs.version-type != 'release' }}

          modrinth-id: ${{ steps.modrinth.outputs.id }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: ${{ needs.prepare.outputs.version-type == 'release' }}
          modrinth-unfeature-mode: subset

          name: ${{ needs.prepare.outputs.release-name }}
          version: ${{ needs.prepare.outputs.version }}
          version-type: ${{ needs.prepare.outputs.version-type }}
          changelog-file: release-notes.md

          files: |
            dist/FineClaim-*.jar

          loaders: |
            paper
            folia

          game-versions: ${{ steps.game_versions.outputs.list }}

          java: |
            21

      - name: Publish summary
        run: |
          echo "### Release published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${{ needs.prepare.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${{ needs.prepare.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Channel: \`${{ needs.prepare.outputs.version-type }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifacts:" >> "$GITHUB_STEP_SUMMARY"
          ls dist >> "$GITHUB_STEP_SUMMARY"
