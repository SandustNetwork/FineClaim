name: Bug Report
description: Report unexpected behavior or a reproducible bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of the problem.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Start a Folia server with FineClaim ...
        2. Run `/claim` as PlayerA ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: FineClaim version
      description: Plugin version or commit hash
      placeholder: 1.0.0-SNAPSHOT
    validations:
      required: true

  - type: input
    id: server
    attributes:
      label: Server software and version
      description: For example Folia 1.21.4
      placeholder: Folia 1.21.4
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant console or server log output
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this report
          required: true
        - label: I tested on Folia (not only Paper/Spigot) if the bug is region/thread related
          required: false
