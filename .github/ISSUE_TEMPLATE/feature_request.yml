name: Feature Request
description: Suggest an idea or improvement for FineClaim
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe the problem and the solution you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve?
      placeholder: I'm always frustrated when ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you considered

  - type: dropdown
    id: scope
    attributes:
      label: Feature area
      description: Which part of the plugin is most affected?
      options:
        - Claims / ownership
        - Trust / permissions
        - Protection / listeners
        - Commands
        - Storage / persistence
        - Configuration
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this request
          required: true
        - label: This request fits the current scope of FineClaim (chunk-based land claims)
          required: true
